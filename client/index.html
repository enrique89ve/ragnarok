<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ragnarok: Norse Mythos</title>
    <meta name="description" content="A multi-mythology digital collectible card game with poker combat" />
    <meta name="theme-color" content="#d4af37" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ragnarok" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <!-- DNS prefetch for external APIs -->
    <link rel="dns-prefetch" href="https://api.hive.blog" />
    <link rel="dns-prefetch" href="https://0.peerjs.com" />
    <!-- Fonts: preconnect early, load async to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Cinzel+Decorative:wght@700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Cinzel+Decorative:wght@700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" /></noscript>
    <!-- Inline critical CSS: black background + loading spinner for instant first paint -->
    <style>
      html, body { margin: 0; padding: 0; background: #0a0a1a; color: #e0e0e0; font-family: Inter, system-ui, sans-serif; }
      #root { min-height: 100vh; min-height: 100dvh; }
      @keyframes sk { to { transform: rotate(360deg); } }
      #root:empty::after {
        content: ''; display: block; width: 48px; height: 48px;
        margin: 45vh auto; border: 3px solid #d4af3740; border-top-color: #d4af37;
        border-radius: 50%; animation: sk .8s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
